<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crédito Educativo</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

    <div class="container">

        <h1>Crédito Educativo</h1>

        <form action="/calcular_credito">

            <label>Valor del crédito</label>
            <input type="text" name="monto" value="{{ monto or '' }}">

            <label>Tasa de interés mensual</label>
            <input type="text" name="tasa" value="{{ tasa or '' }}">

            <label>Número de cuotas</label>
            <input type="text" name="plazo" value="{{ plazo or '' }}">

            <input type="submit" value="Calcular">

        </form>

        {% if error %}
        <p>{{ error }}</p>
        {% endif %}

        {% if cuota %}
        <h2>Cuota mensual:</h2>
        <p>{{ cuota }}</p>
        {% endif %}

    </div>

</body>

</html>
